name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-x64:
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Build and test Release
        shell: powershell
        run: .\scripts\build.ps1 Release
      - name: Package portable build
        shell: powershell
        run: .\scripts\package-release.ps1 -SkipBuild
      - name: Install Inno Setup
        shell: powershell
        run: .\scripts\install-inno-setup.ps1
      - name: Package installer
        shell: powershell
        run: .\scripts\build-installer.ps1 -SkipPackage
      - name: Test installer
        shell: powershell
        run: .\scripts\test-installer.ps1
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: OpenReplay-windows-x64
          path: |
            artifacts/package/OpenReplay-*-win-x64.zip
            artifacts/package/OpenReplay-*-win-x64.zip.sha256
            artifacts/package/OpenReplay-*-win-x64-installer.exe
            artifacts/package/OpenReplay-*-win-x64-installer.exe.sha256
          if-no-files-found: error
          retention-days: 14
